spring:
  application:
    name: finflow-transaction

  datasource:
    url: jdbc:postgresql://localhost:5432/finflow_tx
    username: postgres
    password: root
    hikari:
      pool-name: tx-hikari-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

  jpa:
    open-in-view: false            # Lazy loading controller'da ochilib qolmasin
    hibernate:
      ddl-auto: create           # Schema faqat Flyway orqali. Hech qachon 'update'.
    properties:
      hibernate:
        default_schema: tx_sch
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true
        # Instant -> TIMESTAMPTZ. Bu qatorsiz Hibernate 'timestamp without time zone'
        # kutadi va ddl-auto=validate migration'ga qarshi yiqiladi.
        type:
          preferred_instant_jdbc_type: TIMESTAMP_UTC

  flyway:
    enabled: true
    schemas: tx_sch
    default-schema: tx_sch
    create-schemas: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all                    # Barcha replika tasdiqlasin. Pul eventi yo'qolmaydi.
      retries: 3
      properties:
        enable.idempotence: true   # Producer retry duplicate yaratmasin
    consumer:
      group-id: finflow-transaction
      auto-offset-reset: earliest
      enable-auto-commit: false    # Offset faqat muvaffaqiyatli ishlovdan keyin

  threads:
    virtual:
      enabled: true                # Java 21+ Virtual Threads

server:
  port: 8083
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: false               # Redis hali ishlatilmayapti; startup'ni bloklamasin
  tracing:
    sampling:
      probability: 1.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.finflow.transaction: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # Faqat dev. Prod'da OFF — PII log'ga tushmasin.

# ---- Domen sozlamalari (keyingi bosqichlarda ishlatiladi) ----
finflow:
  idempotency:
    ttl: PT24H       # COMPLETED javob qancha yashaydi
    lock-ttl: PT1M   # IN_PROGRESS marker: crash bo'lsa shu vaqtda o'z-o'zidan tozalanadi
  fraud:
    velocity:
      window: PT1M
      max-attempts: 5
    night-window:
      start: "00:00"
      end: "05:00"
